services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    environment:
      PORT: "4000"
      DATABASE_URL: postgres://chat:chat@postgres:5432/chatdb
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-me}
      JWT_EXPIRES_IN: "1d"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  chat-service-1:
    build: ./services/chat-service
    environment:
      PORT: "5000"
      INSTANCE_ID: chat-1
      MONGO_URL: mongodb://mongo:27017/chatdb
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-me}
      AUTH_SERVICE_URL: http://auth-service:4000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  chat-service-2:
    build: ./services/chat-service
    environment:
      PORT: "5000"
      INSTANCE_ID: chat-2
      MONGO_URL: mongodb://mongo:27017/chatdb
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-me}
      AUTH_SERVICE_URL: http://auth-service:4000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - chat-service-1
      - chat-service-2
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  mongodata:
