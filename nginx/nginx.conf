worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ----- Upstreams do chat: balanceamento de carga horizontal -----
    # REST é stateless -> round-robin (distribui cada requisição).
    upstream chat_rest_backend {
        server chat-service-1:5000;
        server chat-service-2:5000;
    }

    # WebSocket -> least_conn distribui as conexões persistentes para a instância
    # com menos conexões ativas. Como o cliente usa transporte websocket-only
    # (sem o handshake em 2 fases do long-polling), não é preciso sticky session.
    # A entrega de mensagens ENTRE instâncias é garantida pelo Redis adapter,
    # então um usuário na chat-1 recebe mensagens de um usuário na chat-2.
    upstream chat_ws_backend {
        least_conn;
        server chat-service-1:5000;
        server chat-service-2:5000;
    }

    upstream auth_backend {
        server auth-service:4000;
    }

    upstream frontend_backend {
        server frontend:80;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # ----- Serviço de autenticação / usuários -----
        location /api/auth/ {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----- WebSocket do chat (balanceado) -----
        location /socket.io/ {
            proxy_pass http://chat_ws_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
        }

        # ----- API REST do chat (balanceada) -----
        location /api/conversations {
            proxy_pass http://chat_rest_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----- Front-end (SPA) -----
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
        }
    }
}
